<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>The Reading Room</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400;1,9..144,500&family=Spectral:ital,wght@0,400;0,500;1,400&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    /* Palette: aged paper reading room, ink, oxblood for emphasis, muted sage for state */
    --paper:#efe9dd;
    --paper-raised:#f6f1e7;
    --ink:#2b2622;
    --ink-soft:#5e564c;
    --ink-faint:#938878;
    --rule:#d8cfbd;
    --oxblood:#7c2d2d;
    --oxblood-soft:#a24a42;
    --sage:#5f6f5a;
    --shadow:rgba(43,38,34,.10);
    --font-display:"Fraunces",Georgia,serif;
    --font-body:"Spectral",Georgia,serif;
    --font-mono:"IBM Plex Mono",ui-monospace,monospace;
    --measure:34rem;
  }
  [data-theme="dark"]{
    --paper:#1a1714;
    --paper-raised:#221e1a;
    --ink:#e9e1d3;
    --ink-soft:#b3a894;
    --ink-faint:#7d7263;
    --rule:#352f28;
    --oxblood:#c9756b;
    --oxblood-soft:#d98a80;
    --sage:#8b9a7f;
    --shadow:rgba(0,0,0,.35);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{-webkit-text-size-adjust:100%}
  body{
    background:var(--paper);color:var(--ink);
    font-family:var(--font-body);font-size:18px;line-height:1.65;
    min-height:100vh;
    transition:background .4s ease,color .4s ease;
  }
  /* ---------- shell ---------- */
  .masthead{
    padding:1.4rem clamp(1rem,4vw,2.5rem) 1.2rem;
    border-bottom:1px solid var(--rule);
    display:flex;align-items:baseline;gap:1rem;flex-wrap:wrap;
    position:sticky;top:0;z-index:20;
    background:color-mix(in srgb,var(--paper) 88%,transparent);
    backdrop-filter:blur(10px);
  }
  .wordmark{
    font-family:var(--font-display);font-weight:500;
    font-size:clamp(1.35rem,4.5vw,1.9rem);line-height:1;
    letter-spacing:-.01em;font-optical-sizing:auto;
  }
  .wordmark em{font-style:italic;color:var(--oxblood);font-weight:400}
  .tally{
    font-family:var(--font-mono);font-size:.7rem;letter-spacing:.08em;
    text-transform:uppercase;color:var(--ink-faint);margin-left:auto;
  }
  .theme-btn{
    background:none;border:1px solid var(--rule);border-radius:2rem;
    color:var(--ink-soft);font-family:var(--font-mono);font-size:.68rem;
    letter-spacing:.08em;text-transform:uppercase;padding:.35rem .8rem;
    cursor:pointer;transition:all .2s;
  }
  .theme-btn:hover{border-color:var(--ink-faint);color:var(--ink)}
  .theme-btn:focus-visible{outline:2px solid var(--oxblood);outline-offset:2px}

  .layout{display:grid;grid-template-columns:16rem 1fr;gap:0;min-height:calc(100vh - 4.5rem)}
  @media(max-width:820px){.layout{grid-template-columns:1fr}}

  /* ---------- filter rail ---------- */
  .rail{
    padding:1.5rem clamp(1rem,3vw,1.6rem);
    border-right:1px solid var(--rule);
  }
  @media(max-width:820px){.rail{border-right:none;border-bottom:1px solid var(--rule)}}
  .search{
    width:100%;background:var(--paper-raised);border:1px solid var(--rule);
    border-radius:.4rem;padding:.6rem .8rem;color:var(--ink);
    font-family:var(--font-body);font-size:.95rem;margin-bottom:1.4rem;
  }
  .search::placeholder{color:var(--ink-faint);font-style:italic}
  .search:focus-visible{outline:2px solid var(--oxblood);outline-offset:1px;border-color:transparent}
  .facet{margin-bottom:1.3rem}
  .facet h3{
    font-family:var(--font-mono);font-size:.66rem;letter-spacing:.12em;
    text-transform:uppercase;color:var(--ink-faint);margin-bottom:.6rem;
  }
  .chips{display:flex;flex-wrap:wrap;gap:.35rem}
  .chip{
    background:none;border:1px solid var(--rule);border-radius:2rem;
    padding:.28rem .7rem;font-family:var(--font-body);font-size:.82rem;
    color:var(--ink-soft);cursor:pointer;transition:all .18s;line-height:1.3;
  }
  .chip:hover{border-color:var(--ink-faint)}
  .chip[aria-pressed="true"]{background:var(--oxblood);border-color:var(--oxblood);color:var(--paper-raised)}
  [data-theme="dark"] .chip[aria-pressed="true"]{color:var(--paper)}
  .chip:focus-visible{outline:2px solid var(--oxblood);outline-offset:2px}
  .clear{
    font-family:var(--font-mono);font-size:.68rem;letter-spacing:.05em;
    color:var(--oxblood);background:none;border:none;cursor:pointer;padding:0;
    text-decoration:underline;text-underline-offset:3px;
  }
  .clear[hidden]{display:none}

  /* ---------- shelf (card grid) ---------- */
  .shelf{padding:1.6rem clamp(1rem,4vw,2.5rem);overflow-y:auto}
  .cards{
    display:grid;grid-template-columns:repeat(auto-fill,minmax(15rem,1fr));
    gap:1rem;
  }
  .card{
    text-align:left;background:var(--paper-raised);border:1px solid var(--rule);
    border-radius:.5rem;padding:1.1rem 1.2rem 1rem;cursor:pointer;
    display:flex;flex-direction:column;gap:.5rem;position:relative;
    transition:transform .18s ease,box-shadow .18s ease,border-color .18s;
    font:inherit;color:inherit;
  }
  .card:hover{transform:translateY(-2px);box-shadow:0 8px 22px var(--shadow);border-color:var(--ink-faint)}
  .card:focus-visible{outline:2px solid var(--oxblood);outline-offset:2px}
  .card-eyebrow{
    font-family:var(--font-mono);font-size:.64rem;letter-spacing:.1em;
    text-transform:uppercase;color:var(--oxblood);display:flex;gap:.5rem;align-items:center;
  }
  .card-title{font-family:var(--font-display);font-weight:500;font-size:1.22rem;line-height:1.15;letter-spacing:-.01em}
  .card-sub{font-style:italic;color:var(--ink-soft);font-size:.92rem}
  .card-excerpt{font-size:.86rem;color:var(--ink-soft);line-height:1.5;
    display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
  .card-foot{margin-top:auto;display:flex;flex-wrap:wrap;gap:.3rem;padding-top:.4rem}
  .tag{font-family:var(--font-mono);font-size:.62rem;letter-spacing:.04em;color:var(--ink-faint);
    border:1px solid var(--rule);border-radius:2rem;padding:.1rem .5rem}
  .status-dot{width:.5rem;height:.5rem;border-radius:50%;background:var(--sage);flex:none}
  .status-dot.draft{background:var(--oxblood-soft)}
  .empty{
    grid-column:1/-1;text-align:center;padding:4rem 1rem;color:var(--ink-faint);
    font-style:italic;font-size:1.05rem;
  }

  /* ---------- reader ---------- */
  .reader{
    position:fixed;inset:0;z-index:40;background:var(--paper);
    overflow-y:auto;opacity:0;pointer-events:none;transition:opacity .35s ease;
  }
  .reader.open{opacity:1;pointer-events:auto}
  .reader-bar{
    position:sticky;top:0;display:flex;align-items:center;gap:1rem;
    padding:1rem clamp(1rem,4vw,2rem);border-bottom:1px solid var(--rule);
    background:color-mix(in srgb,var(--paper) 90%,transparent);backdrop-filter:blur(10px);
  }
  .back{
    background:none;border:none;color:var(--ink-soft);cursor:pointer;
    font-family:var(--font-mono);font-size:.72rem;letter-spacing:.08em;
    text-transform:uppercase;display:flex;align-items:center;gap:.4rem;padding:.2rem;
  }
  .back:hover{color:var(--oxblood)}
  .back:focus-visible{outline:2px solid var(--oxblood);outline-offset:2px}
  .reader-actions{margin-left:auto;display:flex;gap:.5rem}
  .r-act{
    background:none;border:1px solid var(--rule);border-radius:.35rem;
    color:var(--ink-soft);font-family:var(--font-mono);font-size:.66rem;
    letter-spacing:.06em;text-transform:uppercase;padding:.35rem .7rem;cursor:pointer;transition:all .18s;
  }
  .r-act:hover{border-color:var(--ink-faint);color:var(--ink)}
  .r-act:focus-visible{outline:2px solid var(--oxblood);outline-offset:2px}
  .page{max-width:var(--measure);margin:0 auto;padding:2.6rem clamp(1.1rem,5vw,1rem) 6rem}
  .page-eyebrow{font-family:var(--font-mono);font-size:.68rem;letter-spacing:.1em;
    text-transform:uppercase;color:var(--oxblood);margin-bottom:.8rem}
  .page-title{font-family:var(--font-display);font-optical-sizing:auto;font-weight:500;
    font-size:clamp(2rem,7vw,2.9rem);line-height:1.05;letter-spacing:-.02em;margin-bottom:.4rem}
  .page-sub{font-style:italic;color:var(--ink-soft);font-size:1.15rem;margin-bottom:2.2rem}
  .prose{font-size:1.12rem;line-height:1.78}
  .prose p{margin:0 0 1.15em;text-wrap:pretty}
  .prose p.dialogue{text-indent:0}
  .prose em,.prose i{font-style:italic;color:var(--ink)}
  .prose .turn{margin:1.8em 0 .3em}
  .prose .speaker{
    font-family:var(--font-mono);font-size:.64rem;letter-spacing:.12em;
    text-transform:uppercase;color:var(--ink-faint);display:block;margin-bottom:.3em;
  }
  .prose .speaker.you{color:var(--oxblood)}
  .prose hr{border:none;text-align:center;margin:2.2em 0}
  .prose hr::after{content:"\00a7";color:var(--ink-faint);font-size:1.1rem}
  .editor{width:100%;min-height:60vh;background:var(--paper-raised);border:1px solid var(--rule);
    border-radius:.5rem;padding:1.2rem;color:var(--ink);font-family:var(--font-body);
    font-size:1rem;line-height:1.7;resize:vertical}
  .editor:focus-visible{outline:2px solid var(--oxblood);outline-offset:1px}
  .hidden{display:none!important}

  @media(prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>
<body>
<header class="masthead">
  <span class="wordmark">The Reading <em>Room</em></span>
  <button class="theme-btn" id="themeBtn" aria-label="Toggle light and dark">Dusk</button>
  <span class="tally" id="tally"></span>
</header>

<div class="layout">
  <aside class="rail">
    <input class="search" id="search" type="search" placeholder="Search titles and text…" aria-label="Search the library">
    <div class="facet"><h3>Character</h3><div class="chips" id="f-character"></div></div>
    <div class="facet"><h3>Scenario</h3><div class="chips" id="f-scenario"></div></div>
    <div class="facet"><h3>Tags</h3><div class="chips" id="f-tags"></div></div>
    <div class="facet"><h3>Status</h3><div class="chips" id="f-status"></div></div>
    <button class="clear" id="clear" hidden>Clear all filters</button>
  </aside>

  <main class="shelf">
    <div class="cards" id="cards"></div>
  </main>
</div>

<section class="reader" id="reader" aria-hidden="true">
  <div class="reader-bar">
    <button class="back" id="back">‹ Shelf</button>
    <div class="reader-actions">
      <button class="r-act" id="editToggle">Edit</button>
      <button class="r-act" id="exportMd">Export .md</button>
    </div>
  </div>
  <article class="page" id="page"></article>
</section>

<script>
/* ============================================================
   DATA MODEL
   Each story: {id,title,character,scenario,tags[],status,date,
   summary, turns:[{speaker,you:bool,text}] OR body:"markdown"}
   Replace SAMPLE with your manifest.json fetch. See note at bottom.
   ============================================================ */
const SAMPLE = [
  {
    id:"thaw-01", title:"Thaw", character:"Gale", scenario:"Thaw",
    tags:["slow burn","amnesia","hurt/comfort","cabin"], status:"complete",
    date:"2026-01-12",
    summary:"The fever breaks. Two strangers find the first uneasy rhythm of a shared roof.",
    turns:[
      {speaker:"Gale",you:false,text:"The kettle had been screaming for a while before I noticed. I set it off the heat and stood there, listening to the pipes settle. *She's awake, then.* I could hear her moving in the other room, careful, testing the floor like it might not hold her."},
      {speaker:"Riv",you:true,text:"\"You could have knocked,\" she said from the doorway."},
      {speaker:"Gale",you:false,text:"\"I could have. I didn't want to presume.\" I kept my back to her a moment longer than was strictly polite, arranging two mugs that did not need arranging. When I turned, she was holding the door frame, and something in me eased and clenched at once. \"Tea. It's only tea. I haven't the imagination for anything grander before noon.\""}
    ]
  },
  {
    id:"pretend-03", title:"Pretend", character:"Gale", scenario:"Pretend",
    tags:["fake marriage","strangers","festive","forced proximity"], status:"complete",
    date:"2025-12-28",
    summary:"Blackheath, the family home, a second ceremony proposed over cold turkey.",
    turns:[
      {speaker:"Gale",you:false,text:"My mother had put us in the good room. The one with the piano nobody played and the photographs of people I'd have to explain eventually. *This was a mistake.* A warm, catastrophic mistake with a ring on it."}
    ]
  },
  {
    id:"masq-final", title:"Masquerade", character:"Gale", scenario:"Masquerade",
    tags:["enemies to lovers","office","identity reveal","anonymous"], status:"complete",
    date:"2025-11-30",
    summary:"Morning, and the mask off at last. The reveal lands, and holds.",
    turns:[
      {speaker:"Gale",you:false,text:"I knew before I opened my eyes. The particular way she breathed, the cold of her hands even in a warm bed. *Of course. Of course it was her.* Every argument we'd ever had rearranged itself into something else entirely."}
    ]
  },
  {
    id:"cas-01", title:"The Waiting", character:"Castiel", scenario:"Supernatural", 
    tags:["yearning","grief","slow burn"], status:"draft", date:"2026-02-02",
    summary:"An angel learns the arithmetic of a human evening.",
    turns:[
      {speaker:"Castiel",you:false,text:"I did not need to sit. I sat anyway, because she had, and the space beside her had become the only place in the room that made sense."}
    ]
  }
];

let DATA = SAMPLE;
const state = {q:"", character:new Set(), scenario:new Set(), tags:new Set(), status:new Set()};
let current = null, editing = false;

const $ = s=>document.querySelector(s);
const uniq = k => [...new Set(DATA.flatMap(d=>Array.isArray(d[k])?d[k]:[d[k]]).filter(Boolean))].sort();

/* ---- theme ---- */
const themeBtn = $("#themeBtn");
function setTheme(t){document.documentElement.dataset.theme=t;themeBtn.textContent=t==="dark"?"Dawn":"Dusk"}
themeBtn.onclick=()=>setTheme(document.documentElement.dataset.theme==="dark"?"light":"dark");
if(matchMedia("(prefers-color-scheme:dark)").matches)setTheme("dark");

/* ---- facets ---- */
function facet(key,elId){
  const box=$(elId);box.innerHTML="";
  uniq(key).forEach(v=>{
    const b=document.createElement("button");
    b.className="chip";b.textContent=v;b.setAttribute("aria-pressed","false");
    b.onclick=()=>{const s=state[key];s.has(v)?s.delete(v):s.add(v);
      b.setAttribute("aria-pressed",s.has(v));render()};
    box.appendChild(b);
  });
}
function buildFacets(){facet("character","#f-character");facet("scenario","#f-scenario");
  facet("tags","#f-tags");facet("status","#f-status")}

/* ---- filtering ---- */
function plain(story){
  return story.turns?story.turns.map(t=>t.text).join(" ") : (story.body||"");
}
function match(d){
  const setOk=(k,val)=>state[k].size===0 || (Array.isArray(val)?val.some(v=>state[k].has(v)):state[k].has(val));
  if(!setOk("character",d.character))return false;
  if(!setOk("scenario",d.scenario))return false;
  if(!setOk("status",d.status))return false;
  if(state.tags.size&&!(d.tags||[]).some(t=>state.tags.has(t)))return false;
  if(state.q){
    const hay=(d.title+" "+d.summary+" "+plain(d)).toLowerCase();
    if(!hay.includes(state.q.toLowerCase()))return false;
  }
  return true;
}

/* ---- render shelf ---- */
function render(){
  const list=DATA.filter(match);
  const cards=$("#cards");cards.innerHTML="";
  $("#tally").textContent=`${list.length} of ${DATA.length}`;
  const anyFilter=state.q||state.character.size||state.scenario.size||state.tags.size||state.status.size;
  $("#clear").hidden=!anyFilter;
  if(!list.length){
    cards.innerHTML=`<p class="empty">Nothing here yet. Loosen a filter and the shelf fills again.</p>`;return;
  }
  list.forEach(d=>{
    const c=document.createElement("button");c.className="card";
    c.innerHTML=`
      <span class="card-eyebrow"><span class="status-dot ${d.status==='draft'?'draft':''}"></span>${d.character} · ${d.scenario}</span>
      <span class="card-title">${d.title}</span>
      <span class="card-sub">${d.summary||""}</span>
      <span class="card-excerpt">${plain(d).replace(/[*_#>]/g,"").slice(0,180)}…</span>
      <span class="card-foot">${(d.tags||[]).slice(0,3).map(t=>`<span class="tag">${t}</span>`).join("")}</span>`;
    c.onclick=()=>openReader(d);
    cards.appendChild(c);
  });
}

/* ---- reader ---- */
function turnsToHtml(story){
  if(story.turns){
    return story.turns.map(t=>`
      <div class="turn"><span class="speaker ${t.you?'you':''}">${t.speaker}</span>
      ${mdParas(t.text)}</div>`).join("");
  }
  return mdParas(story.body||"");
}
function mdParas(txt){
  return txt.split(/\n{2,}/).map(p=>{
    p=p.trim();if(!p)return"";
    if(p==="---"||p==="§")return"<hr>";
    p=p.replace(/\*(.+?)\*/g,"<em>$1</em>").replace(/_(.+?)_/g,"<em>$1</em>");
    const dlg=/^["“]/.test(p)?" dialogue":"";
    return `<p class="${dlg.trim()}">${p}</p>`;
  }).join("");
}
function openReader(d){
  current=d;editing=false;
  $("#page").innerHTML=`
    <div class="page-eyebrow">${d.character} · ${d.scenario} · ${d.date||""}</div>
    <h1 class="page-title">${d.title}</h1>
    <div class="page-sub">${d.summary||""}</div>
    <div class="prose" id="prose">${turnsToHtml(d)}</div>
    <textarea class="editor hidden" id="editor"></textarea>`;
  $("#editToggle").textContent="Edit";
  $("#reader").classList.add("open");$("#reader").setAttribute("aria-hidden","false");
  document.body.style.overflow="hidden";$("#back").focus();
}
function closeReader(){
  $("#reader").classList.remove("open");$("#reader").setAttribute("aria-hidden","true");
  document.body.style.overflow="";current=null;
}
function toMarkdown(d){
  const fm=`---\ntitle: ${d.title}\ncharacter: ${d.character}\nscenario: ${d.scenario}\ntags: [${(d.tags||[]).join(", ")}]\nstatus: ${d.status}\ndate: ${d.date||""}\n---\n\n`;
  const body=d.turns? d.turns.map(t=>`**${t.speaker}${t.you?" (you)":""}:** ${t.text}`).join("\n\n") : (d.body||"");
  return fm+body;
}
$("#back").onclick=closeReader;
addEventListener("keydown",e=>{if(e.key==="Escape"&&$("#reader").classList.contains("open"))closeReader()});
$("#editToggle").onclick=()=>{
  const prose=$("#prose"),ed=$("#editor");editing=!editing;
  if(editing){ed.value=toMarkdown(current);ed.classList.remove("hidden");prose.classList.add("hidden");
    $("#editToggle").textContent="Preview";ed.focus();}
  else{prose.classList.remove("hidden");ed.classList.add("hidden");$("#editToggle").textContent="Edit";}
};
$("#exportMd").onclick=()=>{
  const blob=new Blob([toMarkdown(current)],{type:"text/markdown"});
  const a=document.createElement("a");a.href=URL.createObjectURL(blob);
  a.download=`${current.id||current.title}.md`;a.click();URL.revokeObjectURL(a.href);
};

/* ---- controls ---- */
$("#search").oninput=e=>{state.q=e.target.value;render()};
$("#clear").onclick=()=>{
  state.q="";["character","scenario","tags","status"].forEach(k=>state[k].clear());
  $("#search").value="";document.querySelectorAll('.chip[aria-pressed="true"]').forEach(c=>c.setAttribute("aria-pressed","false"));
  render();
};

/* ---- boot ---- */
/* To go live: replace SAMPLE with
   DATA = await (await fetch('./manifest.json')).json();
   then call buildFacets(); render();  */
buildFacets();render();
</script>
</body>
</html>
