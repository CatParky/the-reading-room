<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="robots" content="noindex, nofollow">
<title>The Reading Room</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400;1,9..144,500&family=Spectral:ital,wght@0,400;0,500;1,400&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#efe9dd; --paper-raised:#f6f1e7;
    --ink:#2b2622; --ink-soft:#5e564c; --ink-faint:#938878;
    --rule:#d8cfbd; --oxblood:#7c2d2d; --oxblood-soft:#a24a42;
    --sage:#5f6f5a; --shadow:rgba(43,38,34,.10);
    --font-display:"Fraunces",Georgia,serif;
    --font-body:"Spectral",Georgia,serif;
    --font-mono:"IBM Plex Mono",ui-monospace,monospace;
    --measure:34rem; --prose-size:1.12rem;
  }
  [data-theme="dark"]{
    --paper:#1a1714; --paper-raised:#221e1a;
    --ink:#e9e1d3; --ink-soft:#b3a894; --ink-faint:#7d7263;
    --rule:#352f28; --oxblood:#c9756b; --oxblood-soft:#d98a80;
    --sage:#8b9a7f; --shadow:rgba(0,0,0,.35);
  }
  [data-theme="night"]{
    --paper:#101418; --paper-raised:#171c22;
    --ink:#c9d4de; --ink-soft:#8d9aa8; --ink-faint:#5d6975;
    --rule:#232b34; --oxblood:#c98a6b; --oxblood-soft:#d99f80;
    --sage:#7f9a8f; --shadow:rgba(0,0,0,.45);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{-webkit-text-size-adjust:100%}
  body{background:var(--paper);color:var(--ink);font-family:var(--font-body);
    font-size:18px;line-height:1.65;min-height:100vh;
    transition:background .4s,color .4s}

  /* ---------- gate ---------- */
  .gate{position:fixed;inset:0;z-index:100;background:var(--paper);
    display:flex;align-items:center;justify-content:center;padding:1.5rem}
  .gate.hidden{display:none}
  .gate-card{max-width:24rem;width:100%;text-align:center}
  .gate-mark{font-family:var(--font-display);font-weight:500;font-size:2rem;
    letter-spacing:-.01em;margin-bottom:.4rem}
  .gate-mark em{font-style:italic;color:var(--oxblood);font-weight:400}
  .gate-sub{font-style:italic;color:var(--ink-soft);margin-bottom:2rem;font-size:.95rem}
  .gate-input{width:100%;background:var(--paper-raised);border:1px solid var(--rule);
    border-radius:.45rem;padding:.75rem 1rem;color:var(--ink);
    font-family:var(--font-body);font-size:1.05rem;text-align:center;letter-spacing:.05em}
  .gate-input:focus-visible{outline:2px solid var(--oxblood);outline-offset:1px}
  .gate-btn{margin-top:1rem;width:100%;background:var(--oxblood);color:var(--paper-raised);
    border:none;border-radius:.45rem;padding:.75rem;cursor:pointer;
    font-family:var(--font-mono);font-size:.75rem;letter-spacing:.14em;text-transform:uppercase}
  .gate-btn:hover{background:var(--oxblood-soft)}
  .gate-btn:focus-visible{outline:2px solid var(--ink);outline-offset:2px}
  .gate-remember{margin-top:1rem;font-size:.82rem;color:var(--ink-soft);
    display:flex;gap:.45rem;align-items:center;justify-content:center}
  .gate-err{margin-top:1rem;color:var(--oxblood);font-size:.88rem;font-style:italic;min-height:1.4em}
  .gate-status{margin-top:.6rem;font-family:var(--font-mono);font-size:.68rem;
    letter-spacing:.08em;color:var(--ink-faint);min-height:1.2em}

  /* ---------- shell ---------- */
  .masthead{padding:1.3rem clamp(1rem,4vw,2.5rem) 1.1rem;border-bottom:1px solid var(--rule);
    display:flex;align-items:baseline;gap:.9rem;flex-wrap:wrap;position:sticky;top:0;z-index:20;
    background:color-mix(in srgb,var(--paper) 88%,transparent);backdrop-filter:blur(10px)}
  .wordmark{font-family:var(--font-display);font-weight:500;
    font-size:clamp(1.3rem,4.5vw,1.8rem);line-height:1;letter-spacing:-.01em}
  .wordmark em{font-style:italic;color:var(--oxblood);font-weight:400}
  .tally{font-family:var(--font-mono);font-size:.68rem;letter-spacing:.08em;
    text-transform:uppercase;color:var(--ink-faint);margin-left:auto}
  .pill{background:none;border:1px solid var(--rule);border-radius:2rem;color:var(--ink-soft);
    font-family:var(--font-mono);font-size:.66rem;letter-spacing:.08em;text-transform:uppercase;
    padding:.32rem .75rem;cursor:pointer;transition:all .2s}
  .pill:hover{border-color:var(--ink-faint);color:var(--ink)}
  .pill:focus-visible{outline:2px solid var(--oxblood);outline-offset:2px}

  .layout{display:grid;grid-template-columns:16rem 1fr;min-height:calc(100vh - 4.3rem)}
  @media(max-width:820px){.layout{grid-template-columns:1fr}}
  .rail{padding:1.5rem clamp(1rem,3vw,1.6rem);border-right:1px solid var(--rule)}
  @media(max-width:820px){.rail{border-right:none;border-bottom:1px solid var(--rule)}}
  .search{width:100%;background:var(--paper-raised);border:1px solid var(--rule);
    border-radius:.4rem;padding:.6rem .8rem;color:var(--ink);
    font-family:var(--font-body);font-size:.95rem;margin-bottom:1.4rem}
  .search::placeholder{color:var(--ink-faint);font-style:italic}
  .search:focus-visible{outline:2px solid var(--oxblood);outline-offset:1px}
  .facet{margin-bottom:1.3rem}
  .facet h3{font-family:var(--font-mono);font-size:.64rem;letter-spacing:.12em;
    text-transform:uppercase;color:var(--ink-faint);margin-bottom:.6rem}
  .chips{display:flex;flex-wrap:wrap;gap:.35rem}
  .chip{background:none;border:1px solid var(--rule);border-radius:2rem;
    padding:.26rem .7rem;font-family:var(--font-body);font-size:.82rem;
    color:var(--ink-soft);cursor:pointer;transition:all .18s;line-height:1.3}
  .chip:hover{border-color:var(--ink-faint)}
  .chip[aria-pressed="true"]{background:var(--oxblood);border-color:var(--oxblood);color:var(--paper-raised)}
  .chip:focus-visible{outline:2px solid var(--oxblood);outline-offset:2px}
  .clear{font-family:var(--font-mono);font-size:.66rem;color:var(--oxblood);background:none;
    border:none;cursor:pointer;text-decoration:underline;text-underline-offset:3px;padding:0}
  .clear[hidden]{display:none}

  .shelf{padding:1.6rem clamp(1rem,4vw,2.5rem)}
  .cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(15rem,1fr));gap:1rem}
  .card{text-align:left;background:var(--paper-raised);border:1px solid var(--rule);
    border-radius:.5rem;padding:1.1rem 1.2rem 1rem;cursor:pointer;display:flex;
    flex-direction:column;gap:.5rem;transition:transform .18s,box-shadow .18s,border-color .18s;
    font:inherit;color:inherit}
  .card:hover{transform:translateY(-2px);box-shadow:0 8px 22px var(--shadow);border-color:var(--ink-faint)}
  .card:focus-visible{outline:2px solid var(--oxblood);outline-offset:2px}
  .card-eyebrow{font-family:var(--font-mono);font-size:.62rem;letter-spacing:.1em;
    text-transform:uppercase;color:var(--oxblood);display:flex;gap:.5rem;align-items:center}
  .card-title{font-family:var(--font-display);font-weight:500;font-size:1.22rem;line-height:1.15}
  .card-sub{font-style:italic;color:var(--ink-soft);font-size:.9rem}
  .card-foot{margin-top:auto;display:flex;flex-wrap:wrap;gap:.3rem;padding-top:.4rem}
  .tag{font-family:var(--font-mono);font-size:.6rem;color:var(--ink-faint);
    border:1px solid var(--rule);border-radius:2rem;padding:.1rem .5rem}
  .empty{grid-column:1/-1;text-align:center;padding:4rem 1rem;color:var(--ink-faint);
    font-style:italic;font-size:1.05rem;line-height:1.8}

  /* ---------- reader ---------- */
  .reader{position:fixed;inset:0;z-index:40;background:var(--paper);overflow-y:auto;
    opacity:0;pointer-events:none;transition:opacity .3s}
  .reader.open{opacity:1;pointer-events:auto}
  .reader-bar{position:sticky;top:0;display:flex;align-items:center;gap:.8rem;
    padding:.9rem clamp(1rem,4vw,2rem);border-bottom:1px solid var(--rule);
    background:color-mix(in srgb,var(--paper) 90%,transparent);backdrop-filter:blur(10px)}
  .back{background:none;border:none;color:var(--ink-soft);cursor:pointer;
    font-family:var(--font-mono);font-size:.7rem;letter-spacing:.08em;text-transform:uppercase;padding:.2rem}
  .back:hover{color:var(--oxblood)}
  .back:focus-visible{outline:2px solid var(--oxblood);outline-offset:2px}
  .reader-actions{margin-left:auto;display:flex;gap:.4rem;align-items:center}
  .page{max-width:var(--measure);margin:0 auto;padding:2.4rem clamp(1.1rem,5vw,1rem) 6rem}
  .page-eyebrow{font-family:var(--font-mono);font-size:.66rem;letter-spacing:.1em;
    text-transform:uppercase;color:var(--oxblood);margin-bottom:.8rem}
  .page-title{font-family:var(--font-display);font-optical-sizing:auto;font-weight:500;
    font-size:clamp(2rem,7vw,2.8rem);line-height:1.05;letter-spacing:-.02em;margin-bottom:.4rem}
  .page-sub{font-style:italic;color:var(--ink-soft);font-size:1.12rem;margin-bottom:2.2rem}
  .prose{font-size:var(--prose-size);line-height:1.78}
  .prose p{margin:0 0 1.15em;text-wrap:pretty}
  .prose em{font-style:italic}
  .prose strong{font-weight:600}
  .prose h2,.prose h3{font-family:var(--font-display);font-weight:500;margin:1.6em 0 .6em;line-height:1.2}
  .prose blockquote{border-left:2px solid var(--rule);padding-left:1em;color:var(--ink-soft);
    font-style:italic;margin:0 0 1.15em}
  .prose hr{border:none;text-align:center;margin:2.2em 0}
  .prose hr::after{content:"\00a7";color:var(--ink-faint);font-size:1.1rem}

  @media(prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>
<body>

<!-- passphrase gate -->
<div class="gate" id="gate">
  <div class="gate-card">
    <div class="gate-mark">The Reading <em>Room</em></div>
    <p class="gate-sub">Members only. The librarian will ask for your word.</p>
    <input class="gate-input" id="pass" type="password" autocomplete="current-password"
      placeholder="passphrase" aria-label="Passphrase">
    <button class="gate-btn" id="unlock">Unlock the door</button>
    <label class="gate-remember">
      <input type="checkbox" id="remember"> Remember on this device
    </label>
    <p class="gate-err" id="gateErr" role="alert"></p>
    <p class="gate-status" id="gateStatus"></p>
  </div>
</div>

<header class="masthead">
  <span class="wordmark">The Reading <em>Room</em></span>
  <button class="pill" id="themeBtn">Theme</button>
  <button class="pill" id="sizeBtn" aria-label="Cycle text size">Aa</button>
  <button class="pill" id="lockBtn">Lock</button>
  <span class="tally" id="tally"></span>
</header>

<div class="layout">
  <aside class="rail">
    <input class="search" id="search" type="search" placeholder="Search titles and text…" aria-label="Search">
    <div class="facet"><h3>Character</h3><div class="chips" id="f-character"></div></div>
    <div class="facet"><h3>Scenario</h3><div class="chips" id="f-scenario"></div></div>
    <div class="facet"><h3>Tags</h3><div class="chips" id="f-tags"></div></div>
    <div class="facet"><h3>Status</h3><div class="chips" id="f-status"></div></div>
    <button class="clear" id="clear" hidden>Clear all filters</button>
  </aside>
  <main class="shelf"><div class="cards" id="cards"></div></main>
</div>

<section class="reader" id="reader" aria-hidden="true">
  <div class="reader-bar">
    <button class="back" id="back">‹ Shelf</button>
    <div class="reader-actions">
      <button class="pill" id="sizeBtn2" aria-label="Cycle text size">Aa</button>
      <button class="pill" id="themeBtn2">Theme</button>
    </div>
  </div>
  <article class="page" id="page"></article>
</section>

<script>
/* ================= crypto (must match tools/prepare.html) ================= */
const ITER = 310000;
const b64 = a => btoa(String.fromCharCode(...new Uint8Array(a)));
const unb64 = s => Uint8Array.from(atob(s), c=>c.charCodeAt(0));
async function deriveKey(pass, salt){
  const raw = await crypto.subtle.importKey("raw", new TextEncoder().encode(pass),
    "PBKDF2", false, ["deriveKey"]);
  return crypto.subtle.deriveKey(
    {name:"PBKDF2", salt, iterations:ITER, hash:"SHA-256"},
    raw, {name:"AES-GCM", length:256}, false, ["decrypt","encrypt"]);
}
async function decryptStory(pkg, pass){
  const key = await deriveKey(pass, unb64(pkg.salt));
  const pt = await crypto.subtle.decrypt({name:"AES-GCM", iv:unb64(pkg.iv)}, key, unb64(pkg.ct));
  return JSON.parse(new TextDecoder().decode(pt));
}

/* ================= state ================= */
let DATA = [];
let PASS = null;
const state = {q:"", character:new Set(), scenario:new Set(), tags:new Set(), status:new Set()};
let current = null;
const $ = s=>document.querySelector(s);

/* ================= gate & loading ================= */
async function loadLibrary(pass){
  $("#gateStatus").textContent = "Fetching the shelf…";
  let manifest;
  try{
    manifest = await (await fetch("./manifest.json", {cache:"no-store"})).json();
  }catch(e){
    throw new Error("Couldn't load manifest.json. If the library is brand new, add a story first.");
  }
  const files = manifest.stories || [];
  if(!files.length){ DATA = []; return; }
  const out = [];
  let failed = 0;
  for(let i=0;i<files.length;i++){
    $("#gateStatus").textContent = `Unlocking ${i+1} of ${files.length}…`;
    try{
      const pkg = await (await fetch(`./stories/${files[i]}`, {cache:"no-store"})).json();
      const story = await decryptStory(pkg, pass);
      story._file = files[i];
      out.push(story);
    }catch(e){ failed++; }
  }
  if(files.length && out.length===0) throw new Error("wrongpass");
  DATA = out.sort((a,b)=>(b.date||"").localeCompare(a.date||""));
  if(failed) console.warn(failed+" file(s) failed to decrypt");
}
async function tryUnlock(pass, fromStorage){
  $("#gateErr").textContent = "";
  try{
    await loadLibrary(pass);
    PASS = pass;
    if($("#remember").checked) localStorage.setItem("rr_pass", pass);
    $("#gate").classList.add("hidden");
    buildFacets(); render();
  }catch(e){
    if(fromStorage) localStorage.removeItem("rr_pass");
    $("#gateStatus").textContent = "";
    $("#gateErr").textContent = e.message==="wrongpass"
      ? "That's not the word. Try again."
      : e.message;
  }
}
$("#unlock").onclick = ()=>{ const p=$("#pass").value; if(p) tryUnlock(p,false); };
$("#pass").addEventListener("keydown", e=>{ if(e.key==="Enter") $("#unlock").click(); });
$("#lockBtn").onclick = ()=>{
  localStorage.removeItem("rr_pass"); PASS=null; DATA=[];
  $("#gate").classList.remove("hidden"); $("#pass").value=""; $("#pass").focus();
};
const saved = localStorage.getItem("rr_pass");
if(saved){ $("#remember").checked = true; tryUnlock(saved, true); }

/* ================= themes & size ================= */
const THEMES = ["light","dark","night"];
function setTheme(t){ document.documentElement.dataset.theme = t; localStorage.setItem("rr_theme", t); }
function cycleTheme(){ const cur = document.documentElement.dataset.theme || "light";
  setTheme(THEMES[(THEMES.indexOf(cur)+1)%THEMES.length]); }
$("#themeBtn").onclick = cycleTheme; $("#themeBtn2").onclick = cycleTheme;
setTheme(localStorage.getItem("rr_theme") ||
  (matchMedia("(prefers-color-scheme:dark)").matches ? "dark" : "light"));
const SIZES = ["1.02rem","1.12rem","1.24rem","1.38rem"];
function cycleSize(){ const cur = getComputedStyle(document.documentElement).getPropertyValue("--prose-size").trim();
  const next = SIZES[(SIZES.indexOf(cur)+1) % SIZES.length] || SIZES[1];
  document.documentElement.style.setProperty("--prose-size", next);
  localStorage.setItem("rr_size", next); }
$("#sizeBtn").onclick = cycleSize; $("#sizeBtn2").onclick = cycleSize;
const savedSize = localStorage.getItem("rr_size");
if(savedSize) document.documentElement.style.setProperty("--prose-size", savedSize);

/* ================= facets & filtering ================= */
const uniq = k => [...new Set(DATA.flatMap(d=>Array.isArray(d[k])?d[k]:[d[k]]).filter(Boolean))].sort();
function facet(key, elId){
  const box = $(elId); box.innerHTML = "";
  uniq(key).forEach(v=>{
    const b = document.createElement("button");
    b.className="chip"; b.textContent=v; b.setAttribute("aria-pressed", state[key].has(v));
    b.onclick = ()=>{ const s=state[key]; s.has(v)?s.delete(v):s.add(v);
      b.setAttribute("aria-pressed", s.has(v)); render(); };
    box.appendChild(b);
  });
}
function buildFacets(){ facet("character","#f-character"); facet("scenario","#f-scenario");
  facet("tags","#f-tags"); facet("status","#f-status"); }
function match(d){
  const ok=(k,val)=>state[k].size===0 || (Array.isArray(val)?val.some(v=>state[k].has(v)):state[k].has(val));
  if(!ok("character",d.character)||!ok("scenario",d.scenario)||!ok("status",d.status)) return false;
  if(state.tags.size && !(d.tags||[]).some(t=>state.tags.has(t))) return false;
  if(state.q){
    const hay=(d.title+" "+(d.summary||"")+" "+(d.body||"")).toLowerCase();
    if(!hay.includes(state.q.toLowerCase())) return false;
  }
  return true;
}

/* ================= shelf ================= */
function render(){
  const list = DATA.filter(match);
  const cards = $("#cards"); cards.innerHTML = "";
  $("#tally").textContent = `${list.length} of ${DATA.length}`;
  const any = state.q||state.character.size||state.scenario.size||state.tags.size||state.status.size;
  $("#clear").hidden = !any;
  if(!DATA.length){
    cards.innerHTML = `<p class="empty">The shelves are bare.<br>
      Prepare a story with the tool, drop it in <code>stories/</code>, and push.</p>`;
    return;
  }
  if(!list.length){
    cards.innerHTML = `<p class="empty">Nothing matches. Loosen a filter and the shelf fills again.</p>`;
    return;
  }
  list.forEach(d=>{
    const c = document.createElement("button"); c.className="card";
    c.innerHTML = `
      <span class="card-eyebrow">${esc(d.character||"")} · ${esc(d.scenario||"")}</span>
      <span class="card-title">${esc(d.title||"Untitled")}</span>
      <span class="card-sub">${esc(d.summary||"")}</span>
      <span class="card-foot">${(d.tags||[]).slice(0,4).map(t=>`<span class="tag">${esc(t)}</span>`).join("")}</span>`;
    c.onclick = ()=>openReader(d);
    cards.appendChild(c);
  });
}
function esc(s){ return String(s).replace(/[&<>"]/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }

/* ================= markdown rendering ================= */
function md(txt){
  const blocks = txt.split(/\n{2,}/);
  return blocks.map(b=>{
    b = b.trim(); if(!b) return "";
    if(/^(---|\*\*\*|§)$/.test(b)) return "<hr>";
    if(/^###\s/.test(b)) return `<h3>${inline(b.slice(4))}</h3>`;
    if(/^##\s/.test(b))  return `<h2>${inline(b.slice(3))}</h2>`;
    if(/^>\s?/.test(b))  return `<blockquote><p>${inline(b.replace(/^>\s?/gm,""))}</p></blockquote>`;
    return `<p>${inline(b).replace(/\n/g,"<br>")}</p>`;
  }).join("");
}
function inline(s){
  s = esc(s);
  s = s.replace(/\*\*(.+?)\*\*/g,"<strong>$1</strong>");
  s = s.replace(/\*(.+?)\*/g,"<em>$1</em>");
  s = s.replace(/_(.+?)_/g,"<em>$1</em>");
  return s;
}

/* ================= reader ================= */
function openReader(d){
  current = d;
  $("#page").innerHTML = `
    <div class="page-eyebrow">${esc(d.character||"")} · ${esc(d.scenario||"")}${d.date?" · "+esc(d.date):""}</div>
    <h1 class="page-title">${esc(d.title||"Untitled")}</h1>
    <div class="page-sub">${esc(d.summary||"")}</div>
    <div class="prose">${md(d.body||"")}</div>`;
  $("#reader").classList.add("open"); $("#reader").setAttribute("aria-hidden","false");
  document.body.style.overflow = "hidden";
  const pos = localStorage.getItem("rr_pos_"+(d._file||d.title));
  if(pos) $("#reader").scrollTop = +pos; else $("#reader").scrollTop = 0;
  $("#back").focus();
}
function closeReader(){
  if(current) localStorage.setItem("rr_pos_"+(current._file||current.title), $("#reader").scrollTop);
  $("#reader").classList.remove("open"); $("#reader").setAttribute("aria-hidden","true");
  document.body.style.overflow = ""; current = null;
}
$("#back").onclick = closeReader;
addEventListener("keydown", e=>{ if(e.key==="Escape" && $("#reader").classList.contains("open")) closeReader(); });
let saveT; $("#reader").addEventListener("scroll", ()=>{
  if(!current) return; clearTimeout(saveT);
  saveT = setTimeout(()=>localStorage.setItem("rr_pos_"+(current._file||current.title), $("#reader").scrollTop), 400);
});

/* ================= controls ================= */
$("#search").oninput = e=>{ state.q = e.target.value; render(); };
$("#clear").onclick = ()=>{
  state.q=""; ["character","scenario","tags","status"].forEach(k=>state[k].clear());
  $("#search").value="";
  document.querySelectorAll('.chip[aria-pressed="true"]').forEach(c=>c.setAttribute("aria-pressed","false"));
  render();
};
</script>
</body>
</html>
